<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roma 3D Laberinto Pro</title>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: Arial, sans-serif; }
        #menu-lateral {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 20px; z-index: 3000; text-align: center;
        }
        input { padding: 10px; margin: 10px; border-radius: 10px; border: 1px solid #ccc; width: 80%; }
        button#camera-btn { padding: 15px 30px; background: #34a853; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; }
        video#video-feed { display: none; }
    </style>
</head>
<body>
    <div id="menu-lateral">
        <h1>ROMA 3D</h1>
        <input type="text" id="room-input" placeholder="Nombre de la Sala">
        <br>
        <button id="camera-btn">ENTRAR AL JUEGO</button>
    </div>
    <video id="video-feed" autoplay playsinline muted></video>
    <canvas id="game-canvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.152.0/build/three.module.js"
            }
        }
    </script>
    <script type="module" src="client.js"></script>
</body>
</html>
